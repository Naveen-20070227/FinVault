<!-- All Modal Dialogs -->

<!-- Transaction Modal (Add / Edit) -->
<div class="modal-overlay" id="transaction-modal">
    <div class="modal-container">
        <div class="modal-header">
            <h3 class="modal-title" id="transaction-modal-title">Add Transaction</h3>
            <button class="modal-close-btn" data-close>&times;</button>
        </div>
        <form id="transaction-form">
            <input type="hidden" id="transaction-id">
            <input type="hidden" id="transaction-receipt-url">
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label" for="tx-title">Title</label>
                    <input class="form-control" type="text" id="tx-title" required placeholder="Rent, Salary, Dinner, etc.">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="tx-amount">Amount</label>
                        <input class="form-control" type="number" step="0.01" min="0.01" id="tx-amount" required placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="tx-date">Date</label>
                        <input class="form-control" type="date" id="tx-date" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="tx-type">Type</label>
                        <select class="form-select" id="tx-type" required>
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="tx-category">Category</label>
                        <select class="form-select" id="tx-category" required>
                            <!-- Dynamically loaded -->
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="tx-notes">Notes</label>
                    <textarea class="form-control" id="tx-notes" rows="3" placeholder="Additional details..." style="resize:none;"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label" for="tx-receipt">Receipt File (Optional)</label>
                    <input class="form-control" type="file" id="tx-receipt" accept="image/png, image/jpeg, application/pdf">
                    <div id="tx-receipt-preview" style="margin-top: 8px; font-size: 0.8rem; color: var(--text-secondary); display: none;"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-close>Cancel</button>
                <button type="submit" class="btn btn-primary" id="transaction-submit-btn">Save</button>
            </div>
        </form>
    </div>
</div>

<!-- Category Modal (Add / Edit) -->
<div class="modal-overlay" id="category-modal">
    <div class="modal-container">
        <div class="modal-header">
            <h3 class="modal-title" id="category-modal-title">Add Category</h3>
            <button class="modal-close-btn" data-close>&times;</button>
        </div>
        <form id="category-form">
            <input type="hidden" id="category-id">
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label" for="cat-name">Category Name</label>
                    <input class="form-control" type="text" id="cat-name" required placeholder="Travel, Rent, Dividends...">
                </div>
                <div class="form-group">
                    <label class="form-label" for="cat-type">Type</label>
                    <select class="form-select" id="cat-type" required>
                        <option value="expense">Expense</option>
                        <option value="income">Income</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="cat-icon">Icon Class (Themify Icons)</label>
                    <input class="form-control" type="text" id="cat-icon" required value="ti-tag" placeholder="ti-tag, ti-shopping-cart, ti-home...">
                </div>
                <div class="form-group">
                    <label class="form-label" for="cat-color">Color Hex</label>
                    <input class="form-control" type="color" id="cat-color" required value="#7C3AED" style="height: 45px; padding: 2px; cursor: pointer;">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-close>Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>
</div>

<!-- Budget Modal (Add / Edit) -->
<div class="modal-overlay" id="budget-modal">
    <div class="modal-container">
        <div class="modal-header">
            <h3 class="modal-title" id="budget-modal-title">Set Budget</h3>
            <button class="modal-close-btn" data-close>&times;</button>
        </div>
        <form id="budget-form">
            <input type="hidden" id="budget-id">
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label" for="budget-category">Category (Expense only)</label>
                    <select class="form-select" id="budget-category" required>
                        <!-- Loaded dynamically -->
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="budget-amount">Limit Amount</label>
                    <input class="form-control" type="number" step="0.01" min="0.01" id="budget-amount" required placeholder="0.00">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="budget-month">Month</label>
                        <select class="form-select" id="budget-month" required>
                            <option value="1">January</option>
                            <option value="2">February</option>
                            <option value="3">March</option>
                            <option value="4">April</option>
                            <option value="5">May</option>
                            <option value="6">June</option>
                            <option value="7">July</option>
                            <option value="8">August</option>
                            <option value="9">September</option>
                            <option value="10">October</option>
                            <option value="11">November</option>
                            <option value="12">December</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="budget-year">Year</label>
                        <select class="form-select" id="budget-year" required>
                            <!-- Script will populate +/- 5 years -->
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-close>Cancel</button>
                <button type="submit" class="btn btn-primary">Save Budget</button>
            </div>
        </form>
    </div>
</div>

<!-- Savings Goal Modal (Add / Edit) -->
<div class="modal-overlay" id="goal-modal">
    <div class="modal-container">
        <div class="modal-header">
            <h3 class="modal-title" id="goal-modal-title">New Savings Goal</h3>
            <button class="modal-close-btn" data-close>&times;</button>
        </div>
        <form id="goal-form">
            <input type="hidden" id="goal-id">
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label" for="goal-title">Target Title</label>
                    <input class="form-control" type="text" id="goal-title" required placeholder="New Car, Emergency Fund, Vacation...">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="goal-target">Target Amount</label>
                        <input class="form-control" type="number" step="0.01" min="0.01" id="goal-target" required placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="goal-deadline">Target Deadline</label>
                        <input class="form-control" type="date" id="goal-deadline" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="goal-icon">Icon Class</label>
                        <input class="form-control" type="text" id="goal-icon" required value="ti-target" placeholder="ti-target, ti-home, ti-gift...">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="goal-color">Theme Color</label>
                        <input class="form-control" type="color" id="goal-color" required value="#7C3AED" style="height: 45px; padding: 2px; cursor: pointer;">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-close>Cancel</button>
                <button type="submit" class="btn btn-primary">Save Goal</button>
            </div>
        </form>
    </div>
</div>

<!-- Goal Contribution Modal (fixes H4) -->
<div class="modal-overlay" id="goal-contribute-modal">
    <div class="modal-container">
        <div class="modal-header">
            <h3 class="modal-title">Contribute to Savings</h3>
            <button class="modal-close-btn" data-close>&times;</button>
        </div>
        <form id="goal-contribute-form">
            <input type="hidden" id="goal-contribute-id">
            <div class="modal-body">
                <div style="margin-bottom: 16px; padding: 12px; border-radius: var(--radius-sm); background-color: var(--color-primary-50); font-size: 0.9rem;">
                    Goal: <span id="goal-contribute-title" style="font-weight: 700;">-</span><br>
                    Saved: <span id="goal-contribute-saved">-</span> / Target: <span id="goal-contribute-target">-</span>
                </div>
                <div class="form-group">
                    <label class="form-label" for="goal-contrib-amount">Contribution Amount</label>
                    <input class="form-control" type="number" step="0.01" min="0.01" id="goal-contrib-amount" required placeholder="0.00">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-close>Cancel</button>
                <button type="submit" class="btn btn-success">Add Contribution</button>
            </div>
        </form>
    </div>
</div>

<!-- Bill Modal (Add / Edit) -->
<div class="modal-overlay" id="bill-modal">
    <div class="modal-container">
        <div class="modal-header">
            <h3 class="modal-title" id="bill-modal-title">Set Bill</h3>
            <button class="modal-close-btn" data-close>&times;</button>
        </div>
        <form id="bill-form">
            <input type="hidden" id="bill-id">
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label" for="bill-title">Bill Name / Service</label>
                    <input class="form-control" type="text" id="bill-title" required placeholder="Netflix, Electricity, Home Loan...">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="bill-amount">Bill Amount</label>
                        <input class="form-control" type="number" step="0.01" min="0.01" id="bill-amount" required placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="bill-due">Due Date</label>
                        <input class="form-control" type="date" id="bill-due" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="bill-frequency">Billing Period</label>
                        <select class="form-select" id="bill-frequency" required>
                            <option value="Weekly">Weekly</option>
                            <option value="Monthly" selected>Monthly</option>
                            <option value="Quarterly">Quarterly</option>
                            <option value="Yearly">Yearly</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="bill-category">Category (Optional)</label>
                        <select class="form-select" id="bill-category">
                            <!-- Populated with user expense categories -->
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-close>Cancel</button>
                <button type="submit" class="btn btn-primary">Save Bill</button>
            </div>
        </form>
    </div>
</div>

<!-- Universal Delete Confirmation Modal -->
<div class="modal-overlay" id="delete-confirm-modal">
    <div class="modal-container" style="width: 400px;">
        <div class="modal-header">
            <h3 class="modal-title">Delete Record?</h3>
            <button class="modal-close-btn" data-close>&times;</button>
        </div>
        <div class="modal-body">
            <p style="font-size: 0.95rem; color: var(--text-secondary); line-height: 1.4;">
                Are you sure you want to delete this record? This action cannot be undone and may affect related budget calculations.
            </p>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-close>Cancel</button>
            <button type="button" class="btn btn-danger" id="delete-confirm-btn">Confirm Delete</button>
        </div>
    </div>
</div>
