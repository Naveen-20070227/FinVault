<div style="display: flex; align-items: center; gap: 16px;">
    <i class="ti-menu mobile-nav-toggle" id="mobile-nav-toggle"></i>
    <div class="page-title" id="page-title">Dashboard</div>
</div>
<div class="topbar-actions">
    <button class="theme-toggle" id="theme-toggle" title="Toggle Theme">
        <i class="ti-shine" id="theme-toggle-icon"></i>
    </button>
    <div class="notif-bell-btn" id="notif-bell-btn" title="Notifications">
        <i class="ti-bell"></i>
        <span class="notif-badge" id="notif-badge" style="display: none;">0</span>
        <!-- Notification Dropdown -->
        <div class="notif-dropdown card" id="notif-dropdown" style="display: none;">
            <div class="notif-dropdown-header">
                <h3>Notifications</h3>
                <button class="btn btn-secondary" id="notif-read-all-btn" style="padding: 4px 8px; font-size: 0.75rem;">Mark all read</button>
            </div>
            <div class="notif-dropdown-list" id="notif-dropdown-list">
                <!-- Notifications list items dynamically rendered -->
                <div class="notif-empty">No new notifications</div>
            </div>
        </div>
    </div>
    <div class="user-profile-btn" id="topbar-profile-btn">
        <img class="user-avatar" id="topbar-avatar" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='%23a855f7'><circle cx='50' cy='35' r='20'/><path d='M50,60 C30,60 15,75 15,90 L85,90 C85,75 70,60 50,60 Z'/></svg>" alt="Avatar">
        <div class="user-info">
            <span class="user-name" id="topbar-username">Loading...</span>
            <span class="user-role">Personal Finance</span>
        </div>
    </div>
</div>
