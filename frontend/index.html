<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinVault — Personal Finance Management</title>
    
    <!-- Icons Pack (Themify Icons) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lykmapipo/themify-icons@0.1.2/css/themify-icons.css">
    
    <!-- Chart.js CDN for Analytics rendering -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
</head>
<body>

    <!-- 1. AUTH LAYOUT (Login/Register Forms) -->
    <div class="auth-container" id="auth-layout" style="display: flex;">
        <div class="auth-card card fade-in">
            <div class="auth-logo"><i class="ti-bolt"></i></div>
            <h2 class="auth-title" id="auth-form-title">Login to FinVault</h2>
            
            <!-- Login Form -->
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="login-username">Username or Email</label>
                    <input class="form-control" type="text" id="login-username" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label class="form-label" for="login-password">Password</label>
                    <input class="form-control" type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Sign In</button>
                <div class="auth-switch">
                    Don't have an account? <a href="#" id="goto-register">Create Account</a>
                </div>
            </form>

            <!-- Register Form (hidden initially) -->
            <form id="register-form" style="display: none;">
                <div class="form-group">
                    <label class="form-label" for="register-username">Username</label>
                    <input class="form-control" type="text" id="register-username" required placeholder="jack_doe">
                </div>
                <div class="form-group">
                    <label class="form-label" for="register-email">Email Address</label>
                    <input class="form-control" type="email" id="register-email" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label class="form-label" for="register-password">Password (min 8 chars)</label>
                    <input class="form-control" type="password" id="register-password" minlength="8" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Create Account</button>
                <div class="auth-switch">
                    Already have an account? <a href="#" id="goto-login">Login here</a>
                </div>
            </form>
        </div>
    </div>

    <!-- 2. APP SHELL LAYOUT (Sidebar + Main Header + Content Area) -->
    <div class="app-container" id="app-layout" style="display: none;">
        <!-- Sidebar Navigation Container -->
        <aside class="sidebar" id="sidebar-container"></aside>

        <!-- Main Workspace Area -->
        <main class="main-content">
            <!-- Top Header Navbar Container -->
            <header class="topbar" id="topbar-container"></header>

            <!-- Router Dynamic Fragment Target -->
            <div class="page-wrapper" id="page-wrapper"></div>
        </main>
    </div>

    <!-- Core App Bootstrapper Module -->
    <script type="module" src="js/app.js"></script>
    
    <style>
    /* Auth Form Specific Layout Styles */
    .auth-container {
        min-height: 100vh;
        width: 100vw;
        align-items: center;
        justify-content: center;
        background: transparent;
        padding: 20px;
    }
    
    .auth-card {
        width: 420px;
        max-width: 100%;
        padding: 40px !important;
        text-align: center;
    }
    
    .auth-logo {
        width: 48px;
        height: 48px;
        margin: 0 auto 20px;
        background: linear-gradient(135deg, var(--color-primary-500), var(--color-primary-700));
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 1.6rem;
        box-shadow: 0 0 15px var(--border-glow);
    }
    
    .auth-title {
        font-size: 1.4rem;
        margin-bottom: 24px;
        color: var(--text-primary);
    }
    
    .auth-switch {
        margin-top: 20px;
        font-size: 0.85rem;
        color: var(--text-secondary);
    }
    
    .auth-switch a {
        font-weight: 600;
        color: var(--color-primary-600);
    }
    
    .auth-switch a:hover {
        color: var(--color-primary-500);
    }
    
    .auth-card .form-label {
        color: var(--text-secondary);
        text-align: left;
    }
    </style>
</body>
</html>
